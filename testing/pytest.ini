[pytest]
# Discover scenario tests under scenarios/<name>/tests/
testpaths = scenarios
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra -q --timeout=600
norecursedirs = _* iterations batch-results
markers =
    redundancy: index-redundancy-finder.sh contract tests
    integrity: data-integrity-check.sh contract tests
    perf: perf-advisor.sh contract tests
    healthy_indexes: false-positive guard (well-indexed DB must produce zero redundancy findings)
    jsoncontract: --json output shape/validity guard for all diagnostic scripts
    kbrouter: knowledge-base router (kb_route.py) routing/scoring contract tests
