name: Snyk Code

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    # Weekly re-scan so newly published Snyk rules surface against unchanged code.
    - cron: "0 6 * * 1"

permissions:
  contents: read
  security-events: write   # required to upload SARIF to the Security tab
  actions: read

jobs:
  snyk-code:
    name: Snyk Code (SAST)
    runs-on: ubuntu-latest
    # Don't fail PRs from forks where SNYK_TOKEN isn't available.
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.head.repo.full_name == github.repository }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Snyk CLI
        run: npm install -g snyk

      - name: Snyk Code test (SARIF)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        # `snyk code test` exits non-zero when issues are found. We want the
        # SARIF uploaded regardless, so swallow the exit code here and let the
        # threshold gate below decide whether to fail the build.
        run: |
          snyk code test \
            --sarif-file-output=snyk.sarif \
            --severity-threshold=low \
            || true

      - name: Upload SARIF to GitHub code scanning
        if: always() && hashFiles('snyk.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: snyk.sarif
          category: snyk-code

      - name: Upload SARIF as workflow artifact
        if: always() && hashFiles('snyk.sarif') != ''
        uses: actions/upload-artifact@v4
        with:
          name: snyk-sarif
          path: snyk.sarif
          retention-days: 30

      # Fail the build only on high/critical findings. Tune as desired
      # (e.g. drop to `medium` once the baseline is clean).
      - name: Snyk Code gate (fail on high+)
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        run: snyk code test --severity-threshold=high
